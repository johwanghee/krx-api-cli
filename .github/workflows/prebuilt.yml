name: prebuilt-binaries

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS x86_64
            os: macos-15-intel
            archive_name: krx-api-cli-macos-x86_64.tar.gz
            artifact_stem: krx-api-cli-macos-x86_64
            binary_path: target/release/krx-api-cli
            binary_name: krx-api-cli
          - name: macOS arm64
            os: macos-15
            archive_name: krx-api-cli-macos-arm64.tar.gz
            artifact_stem: krx-api-cli-macos-arm64
            binary_path: target/release/krx-api-cli
            binary_name: krx-api-cli
          - name: Linux x86_64
            os: ubuntu-22.04
            archive_name: krx-api-cli-linux-x86_64.tar.gz
            artifact_stem: krx-api-cli-linux-x86_64
            binary_path: target/release/krx-api-cli
            binary_name: krx-api-cli
          - name: Windows x86_64
            os: windows-2022
            archive_name: krx-api-cli-windows-x86_64.zip
            artifact_stem: krx-api-cli-windows-x86_64
            binary_path: target/release/krx-api-cli.exe
            binary_name: krx-api-cli.exe

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release

      - name: Package archive (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p "dist/${{ matrix.artifact_stem }}"
          cp README.md "dist/${{ matrix.artifact_stem }}/README.md"
          cp "${{ matrix.binary_path }}" "dist/${{ matrix.artifact_stem }}/${{ matrix.binary_name }}"
          tar -C dist -czf "dist/${{ matrix.archive_name }}" "${{ matrix.artifact_stem }}"

      - name: Package archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $staging = "dist/${{ matrix.artifact_stem }}"
          New-Item -ItemType Directory -Force -Path $staging | Out-Null
          Copy-Item README.md (Join-Path $staging "README.md")
          Copy-Item "${{ matrix.binary_path }}" (Join-Path $staging "${{ matrix.binary_name }}")
          Compress-Archive -Path $staging -DestinationPath "dist/${{ matrix.archive_name }}" -Force

      - name: Upload prebuilt artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact_stem }}
          path: dist/${{ matrix.archive_name }}
          if-no-files-found: error

  release:
    name: Publish release assets
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: krx-api-cli-*
          path: dist
          merge-multiple: true

      - name: Generate SHA-256 checksums
        run: |
          cd dist
          sha256sum *.tar.gz *.zip > sha256sums.txt

      - name: Publish GitHub release assets
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          tag="${GITHUB_REF_NAME}"
          if gh release view "${tag}" --repo "${GH_REPO}" >/dev/null 2>&1; then
            gh release upload "${tag}" dist/*.tar.gz dist/*.zip dist/sha256sums.txt --clobber \
              --repo "${GH_REPO}"
          else
            gh release create "${tag}" dist/*.tar.gz dist/*.zip dist/sha256sums.txt \
              --repo "${GH_REPO}" \
              --title "${tag}" \
              --generate-notes
          fi
